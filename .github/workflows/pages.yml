# Публикация статического сайта (index.html) на GitHub Pages.
# Источник — GitHub Actions. Шаг configure-pages с enablement: true
# включает Pages автоматически при первом запуске, без ручных настроек.
name: Deploy to GitHub Pages

on:
  # Обновлять сайт при каждом пуше в main
  push:
    branches: [main]
  # Возможность запустить вручную из вкладки Actions
  workflow_dispatch:

# Права, необходимые для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — только один деплой; новые пуши не отменяют идущий
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Берём весь корень репозитория — в нём лежит index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
